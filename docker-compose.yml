services:
  redis:
    image: redis:7
    container_name: med-parser-redis
    ports:
      - "6379:6379"

  frontend:
    image: node:20-alpine
    container_name: med-parser-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
